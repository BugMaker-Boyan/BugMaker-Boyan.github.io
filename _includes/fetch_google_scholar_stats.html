<script>
    document.addEventListener('DOMContentLoaded', function () {
        var gsDataUrls = [
            {% if site.google_scholar_stats_use_cdn %}
            'https://cdn.jsdelivr.net/gh/{{ site.repository }}@google-scholar-stats/gs_data.json',
            'https://raw.githubusercontent.com/{{ site.repository }}/google-scholar-stats/gs_data.json',
            {% else %}
            'https://raw.githubusercontent.com/{{ site.repository }}/google-scholar-stats/gs_data.json',
            'https://cdn.jsdelivr.net/gh/{{ site.repository }}@google-scholar-stats/gs_data.json',
            {% endif %}
            'https://raw.githubusercontent.com/{{ site.repository }}/refs/heads/google-scholar-stats/gs_data.json'
        ];

        function firstDefined(values) {
            for (var i = 0; i < values.length; i++) {
                if (values[i] !== undefined && values[i] !== null) {
                    return values[i];
                }
            }
            return null;
        }

        function updateText(id, value) {
            if (value === undefined || value === null) {
                return;
            }

            var element = document.getElementById(id);
            if (element) {
                element.textContent = value;
            }
        }

        function updatePaperCitations(data) {
            var citationEles = document.getElementsByClassName('show_paper_citations');

            Array.prototype.forEach.call(citationEles, function (element) {
                var paperId = element.getAttribute('data');
                var publication = data.publications && data.publications[paperId];

                if (publication && publication.num_citations !== undefined) {
                    element.textContent = '| Citations: ' + publication.num_citations;
                }
            });
        }

        function applyGoogleScholarStats(data) {
            updateText('total_cit', firstDefined([
                data.citedby,
                data.cited_by,
                data.total_citations
            ]));

            updateText('h_index', firstDefined([
                data.hindex,
                data.h_index,
                data.indices && data.indices.hindex,
                data.indices && data.indices.h_index
            ]));

            updateText('i10_index', firstDefined([
                data.i10index,
                data.i10_index,
                data.indices && data.indices.i10index,
                data.indices && data.indices.i10_index
            ]));

            updatePaperCitations(data);
        }

        function fetchGoogleScholarStats(urls, index) {
            if (index >= urls.length) {
                return Promise.reject(new Error('No Google Scholar endpoints responded successfully.'));
            }

            var url = urls[index];

            return fetch(url, { cache: 'no-store' }).then(function (response) {
                if (!response.ok) {
                    throw new Error('HTTP ' + response.status);
                }
                return response.json();
            }).catch(function (error) {
                console.warn('Failed to load Google Scholar data from ' + url + ': ' + error.message);
                return fetchGoogleScholarStats(urls, index + 1);
            });
        }

        fetchGoogleScholarStats(gsDataUrls, 0).then(function (data) {
            applyGoogleScholarStats(data);
        }).catch(function (error) {
            console.error('Failed to load Google Scholar data from all endpoints: ' + error.message);
        });
    });
</script>
